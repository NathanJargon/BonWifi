<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BonWifi - Secure Payment</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      
      .container {
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 500px;
        width: 100%;
        padding: 2.5rem;
      }
      
      .header {
        text-align: center;
        margin-bottom: 2rem;
      }
      
      .back-link {
        display: inline-block;
        color: #667eea;
        text-decoration: none;
        font-size: 0.9rem;
        margin-bottom: 1rem;
        cursor: pointer;
      }
      
      .back-link:hover {
        text-decoration: underline;
      }
      
      h1 {
        font-size: 1.8rem;
        color: #1f2937;
        margin-bottom: 0.5rem;
      }
      
      .form-section {
        margin-bottom: 2rem;
      }
      
      .form-row {
        margin-bottom: 1.5rem;
      }
      
      label {
        display: block;
        font-weight: 600;
        color: #374151;
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
      }
      
      input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 1rem;
        background: #f9fafb;
        color: #111;
      }
      
      input:focus {
        outline: none;
        border-color: #667eea;
        background: white;
      }
      
      input:read-only {
        background: #f3f4f6;
        color: #6b7280;
      }
      
      .payment-methods {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 1rem;
        margin-bottom: 2rem;
      }
      
      .method-btn {
        padding: 1.2rem 1rem;
        border: 2px solid #e5e7eb;
        background: white;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.9rem;
        transition: all 0.3s ease;
        text-align: center;
      }
      
      .method-btn:hover {
        border-color: #667eea;
        background: #f3f4f6;
      }
      
      .method-btn.active {
        border-color: #667eea;
        background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
      }
      
      .submit-btn {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      
      .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
      }
      
      .submit-btn:active {
        transform: translateY(0);
      }
      
      #qrContainer {
        text-align: center;
        margin: 2rem 0;
        display: none;
      }
      
      #qrContainer h2 {
        font-size: 1.3rem;
        color: #1f2937;
        margin-bottom: 1rem;
      }
      
      canvas {
        border: 2px solid #e5e7eb;
        padding: 1rem;
        background: white;
        border-radius: 8px;
        margin-bottom: 1rem;
      }
      
      .qr-instruction {
        color: #666;
        font-size: 0.9rem;
        margin-top: 1rem;
      }
      
      .success-message {
        background: linear-gradient(135deg, #10b98115 0%, #10b98105 100%);
        border: 2px solid #10b981;
        padding: 2rem;
        border-radius: 12px;
        margin-top: 2rem;
        display: none;
        text-align: center;
      }
      
      .success-message h2 {
        color: #10b981;
        margin-bottom: 1rem;
        font-size: 1.5rem;
      }
      
      .success-details {
        background: white;
        padding: 1.5rem;
        border-radius: 8px;
        margin: 1rem 0;
        text-align: left;
      }
      
      .detail-row {
        display: flex;
        justify-content: space-between;
        padding: 0.75rem 0;
        border-bottom: 1px solid #e5e7eb;
      }
      
      .detail-row:last-child {
        border-bottom: none;
      }
      
      .detail-label {
        color: #666;
        font-weight: 500;
      }
      
      .detail-value {
        color: #1f2937;
        font-weight: 600;
      }
      
      .hidden {
        display: none;
      }
      
      @media (max-width: 600px) {
        .container {
          padding: 1.5rem;
        }
        
        .payment-methods {
          grid-template-columns: 1fr 1fr;
        }
        
        h1 {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <a href="/" class="back-link">← Back to Plans</a>
        <h1>Complete Payment</h1>
      </div>

      <form id="payForm" class="form-section">
        <div class="form-row">
          <label>Duration</label>
          <input id="minutes" name="minutes" readonly />
        </div>

        <div class="form-row">
          <label>Your Device</label>
          <input id="mac" name="mac" readonly />
        </div>

        <div class="form-row">
          <label>Payment Method</label>
          <div class="payment-methods">
            <button type="button" class="method-btn active" data-method="gcash" onclick="selectMethod('gcash')">
              GCash
            </button>
            <button type="button" class="method-btn" data-method="paymaya" onclick="selectMethod('paymaya')">
              PayMaya
            </button>
            <button type="button" class="method-btn" data-method="gotyme" onclick="selectMethod('gotyme')">
              GoTyme
            </button>
          </div>
        </div>

        <button type="submit" class="submit-btn">Proceed to Pay</button>
      </form>

      <div id="qrContainer">
        <h2>Scan to Pay</h2>
        <canvas id="qr"></canvas>
        <p class="qr-instruction">Open your payment app and scan the code above</p>
      </div>

      <div id="successMessage" class="success-message">
        <h2>Payment Successful</h2>
        <p style="color: #666; margin-bottom: 1rem;">You now have WiFi access</p>
        <div class="success-details" id="successDetails"></div>
        <p style="color: #666; margin-top: 1rem; font-size: 0.9rem;">You can now connect to the WiFi network</p>
      </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const minutes = urlParams.get('minutes') || 30;
      const macFromRouter = urlParams.get('mac');
      
      document.getElementById('minutes').value = getReadableMinutes(minutes);
      const deviceMac = macFromRouter || generatePseudoMAC();
      document.getElementById('mac').value = deviceMac;

      let selectedMethod = 'gcash';

      function generatePseudoMAC() {
        return 'XX:XX:XX:' + 
          Math.random().toString(16).substr(2, 2).toUpperCase() + ':' + 
          Math.random().toString(16).substr(2, 2).toUpperCase() + ':' + 
          Math.random().toString(16).substr(2, 2).toUpperCase();
      }

      function getReadableMinutes(mins) {
        if (mins == 30) return '30 Minutes';
        if (mins == 60) return '1 Hour';
        if (mins == 120) return '2 Hours';
        if (mins == 180) return '3 Hours';
        return mins + ' Minutes';
      }

      function selectMethod(method) {
        selectedMethod = method;
        document.querySelectorAll('.method-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`[data-method="${method}"]`).classList.add('active');
      }

      document.getElementById('payForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const m = minutes;
        const mac = document.getElementById('mac').value;
        
        // Step 1: Create voucher
        const voucherRes = await fetch('/api/create-voucher', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({minutes:m, paymentMethod: selectedMethod})
        });
        const voucherData = await voucherRes.json();
        
        // Step 2: Show QR code based on payment method
        const provider = selectedMethod.charAt(0).toUpperCase() + selectedMethod.slice(1);
        const paymentUrl = `https://${selectedMethod}.app/pay?amount=${getPrice(m)}&reference=${voucherData.code}`;
        
        new QRious({
          element: document.getElementById('qr'),
          value: paymentUrl,
          size: 300,
          level: 'H'
        });
        
        document.getElementById('payForm').classList.add('hidden');
        document.getElementById('qrContainer').style.display = 'block';
        
        // Simulate payment confirmation after 2 seconds
        setTimeout(() => completePayment(voucherData.code, mac, m), 2000);
      });

      function getPrice(minutes) {
        if (minutes == 30) return 50;
        if (minutes == 60) return 100;
        if (minutes == 120) return 200;
        if (minutes == 180) return 300;
        return 0;
      }

      async function completePayment(code, mac, minutes) {
        // Step 2: Auto-redeem the voucher
        const redeemRes = await fetch('/api/redeem', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({mac:mac, code:code})
        });
        const redeemData = await redeemRes.json();
        
        if (redeemRes.ok) {
          const expiresDate = new Date(redeemData.expires_at);
          const price = getPrice(minutes);
          
          document.getElementById('qrContainer').style.display = 'none';
          document.getElementById('successMessage').style.display = 'block';
          
          document.getElementById('successDetails').innerHTML = `
            <div class="detail-row">
              <span class="detail-label">Access Duration</span>
              <span class="detail-value">${getReadableMinutes(minutes)}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Price Paid</span>
              <span class="detail-value">${price === 0 ? 'Free' : '₱' + price}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Payment Method</span>
              <span class="detail-value">${selectedMethod.charAt(0).toUpperCase() + selectedMethod.slice(1)}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Expires At</span>
              <span class="detail-value">${expiresDate.toLocaleTimeString()}</span>
            </div>
          `;
        } else {
          document.getElementById('qrContainer').innerHTML = `<p style="color:#dc3545">Error: ${redeemData.error}</p>`;
        }
      }

      // Allow back navigation
      document.querySelector('.back-link').addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = '/';
      });
    </script>
  </body>
</html>
